<h1>AI Coach</h1>

<div class="card" id="chat"></div>

<input id="msg" placeholder="Ask...">
<button onclick="send()">Send</button>

<script>
function send(){
  const msg = document.getElementById("msg").value;
  const chat = document.getElementById("chat");

  const rtt = window.state.rtt;

  chat.innerHTML += `<p>You: ${msg}</p>`;
  chat.innerHTML += `<p>Coach: Your RTT is ${rtt}. Adjust intensity.</p>`;
}
</script>
